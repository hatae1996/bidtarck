<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>입찰 분석 플랫폼</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect x="1" y="1" width="9" height="9" rx="2" fill="#4F7BF7"/>
            <rect x="12" y="1" width="9" height="9" rx="2" fill="#4F7BF7" opacity="0.4"/>
            <rect x="1" y="12" width="9" height="9" rx="2" fill="#4F7BF7" opacity="0.4"/>
            <rect x="12" y="12" width="9" height="9" rx="2" fill="#4F7BF7"/>
          </svg>
        </div>
        <span class="logo-text">BidTrack</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect y="3" width="16" height="1.5" rx="0.75" fill="currentColor"/>
          <rect y="7.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
          <rect y="11.5" width="16" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showPage('dashboard')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="1" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="10" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>대시보드</span>
      </button>
      <button class="nav-item" onclick="showPage('bids')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="6.5" x2="13" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="9" x2="10" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="11.5" x2="11.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>입찰 목록</span>
      </button>
      <button class="nav-item" onclick="showPage('competitors')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="3.5" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="14.5" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 11.5C6.5 10 7.5 9.5 9 9.5s2.5.5 3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>경쟁사 분석</span>
      </button>
      <button class="nav-item" onclick="showPage('analysis')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polyline points="2,13 6,8 9,10 13,5 16,7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="2" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>통계 분석</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" onclick="showPage('add')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="5.5" x2="9" y2="12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="5.5" y1="9" x2="12.5" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>입찰 등록</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">기</div>
        <div>
          <div class="user-name">기록물 DB팀</div>
          <div class="user-sub">내부 전용</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <div id="page-dashboard" class="page active">
      <!-- Dashboard page content injected by JS -->
    </div>
    <div id="page-bids" class="page">
      <!-- Bid list content -->
    </div>
    <div id="page-competitors" class="page">
      <!-- Competitors content -->
    </div>
    <div id="page-analysis" class="page">
      <!-- Analysis content -->
    </div>
    <div id="page-add" class="page">
      <!-- Add bid content -->
    </div>
  </main>
</div>

<!-- Modal overlay -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-header">
    <h3 id="modal-title">상세 정보</h3>
    <button class="modal-close" onclick="closeModal()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="3" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="3" x2="3" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="app.js"></script>
</body>
</html>
